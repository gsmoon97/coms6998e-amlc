apiVersion: batch/v1
kind: Job
metadata:
  name: resnet18-training
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: gcr.io/${PROJECT_ID}/resnet18-trainer:latest
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: model-storage
              mountPath: /mnt/model
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4
  backoffLimit: 2
